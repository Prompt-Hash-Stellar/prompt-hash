version: 2
updates:
  # Frontend dependencies (npm/yarn)
  # Keep npm dependencies up to date for the frontend
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 15
    reviewers:
      - "Obiajulu-gif"
    labels:
      - "dependencies"
      - "automated"
    commit-message:
      prefix: "deps"
    groups:
      radix:
        patterns:
          - "@radix-ui/*"
      tanstack:
        patterns:
          - "@tanstack/*"
      stellar:
        patterns:
          - "@stellar/*"
          - "@creit.tech/*"
      sentry:
        patterns:
          - "@sentry/*"

  # Backend dependencies (server/)
  - package-ecosystem: "npm"
    directory: "/server"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "automated"
      - "server"
    commit-message:
      prefix: "deps(server)"

  # Rust smart contracts (Cargo)
  - package-ecosystem: "cargo"
    directory: "/contracts"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "automated"
      - "rust"
    commit-message:
      prefix: "deps(contracts)"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "automated"
      - "ci"
    commit-message:
      prefix: "ci(deps)"
